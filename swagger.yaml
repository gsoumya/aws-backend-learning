openapi: 3.0.3
info:
  title: Product Service API
  description: |
    REST API for the Product Service built on AWS Lambda + API Gateway + DynamoDB.

    **Endpoints**
    - `GET /products` - Returns all products with stock count
    - `POST /products` - Creates a new product record
    - `GET /products/{productId}` - Returns a single product with stock count

    > Replace the server URL below with your deployed API Gateway URL after running `cdk deploy`.
  version: 1.0.0
  contact:
    name: Product Service

servers:
  - url: https://{apiId}.execute-api.{region}.amazonaws.com/{stage}
    description: AWS API Gateway (replace with your deployed URL)
    variables:
      apiId:
        default: YOUR_API_ID
        description: API Gateway ID from cdk deploy output
      region:
        default: us-east-1
        description: AWS region
      stage:
        default: prod
        description: Deployment stage

tags:
  - name: Products
    description: Operations related to products

paths:
  /products:
    get:
      tags:
        - Products
      summary: Get all products
      description: Returns the full list of products with stock count joined from products and stock tables.
      operationId: getProducts
      responses:
        "200":
          description: A list of products with stock count
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
                example: "*"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
              example:
                - id: "19ba3d6a-f8ed-491b-a192-0a33b71b38c4"
                  title: Short Sleeve Shirt
                  description: A comfortable cotton shirt
                  price: 25
                  count: 15
    post:
      tags:
        - Products
      summary: Create product
      description: Creates a new product item in the products table.
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
            example:
              title: Hoodie
              description: Warm cotton hoodie
              price: 65
      responses:
        "201":
          description: The created product
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
                example: "*"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedProduct"
              example:
                id: "0e7f1b1d-1e88-4943-8d4b-466021271e57"
                title: Hoodie
                description: Warm cotton hoodie
                price: 65
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "price must be a non-negative integer"

  /products/{productId}:
    get:
      tags:
        - Products
      summary: Get product by ID
      description: Returns a single product with stock count for the given `productId`.
      operationId: getProductById
      parameters:
        - name: productId
          in: path
          required: true
          description: Product UUID
          schema:
            type: string
            format: uuid
            example: "19ba3d6a-f8ed-491b-a192-0a33b71b38c4"
      responses:
        "200":
          description: The requested product with stock count
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
                example: "*"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
              example:
                id: "19ba3d6a-f8ed-491b-a192-0a33b71b38c4"
                title: Short Sleeve Shirt
                description: A comfortable cotton shirt
                price: 25
                count: 15
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "productId path parameter is required"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Product with id 00000000-0000-0000-0000-000000000000 not found"

components:
  schemas:
    Product:
      type: object
      required:
        - id
        - title
        - description
        - price
        - count
      properties:
        id:
          type: string
          format: uuid
          description: Unique product identifier
          example: "19ba3d6a-f8ed-491b-a192-0a33b71b38c4"
        title:
          type: string
          description: Product name
          example: Short Sleeve Shirt
        description:
          type: string
          description: Short description of the product
          example: A comfortable cotton shirt
        price:
          type: integer
          description: Product price
          example: 25
        count:
          type: integer
          description: Product stock count
          example: 15

    CreateProductRequest:
      type: object
      required:
        - title
        - price
      properties:
        title:
          type: string
          description: Product name
          example: Hoodie
        description:
          type: string
          description: Short description of the product
          example: Warm cotton hoodie
        price:
          type: integer
          description: Product price
          example: 65

    CreatedProduct:
      type: object
      required:
        - id
        - title
        - description
        - price
      properties:
        id:
          type: string
          format: uuid
          description: Created product identifier
          example: "0e7f1b1d-1e88-4943-8d4b-466021271e57"
        title:
          type: string
          description: Product name
          example: Hoodie
        description:
          type: string
          description: Short description of the product
          example: Warm cotton hoodie
        price:
          type: integer
          description: Product price
          example: 65

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Human-readable error message
          example: "Product not found"
